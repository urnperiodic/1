<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — StreamVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header scrolled">
    <a href="index.html" class="logo"><i class="fa-solid fa-clapperboard"></i> Stream<span>Verse</span></a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="browse.html?type=movie">Movies</a>
      <a href="browse.html?type=tv">TV Shows</a>
      <a href="browse.html?trending=1">Trending</a>
    </nav>
    <div class="header-spacer"></div>
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="search-input" placeholder="Search movies, shows…" aria-label="Search">
    </div>
    <button class="icon-btn" id="settings-btn" aria-label="Settings"><i class="fa-solid fa-sliders"></i></button>
  </header>

  <main class="grid-page">
    <h1 id="page-title">Browse</h1>
    <p class="sub" id="page-sub"></p>
    <nav class="filter-bar" id="filter-bar"></nav>
    <section class="poster-grid" id="grid"></section>
    <div id="loader" style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto;width:36px;height:36px;border:4px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite"></div></div>
  </main>

  <footer class="site-footer">
    <p>StreamVerse &middot; Metadata by <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a></p>
  </footer>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  <script src="js/tmdb.js"></script>
  <script src="js/providers.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
